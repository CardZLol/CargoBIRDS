Localization
{
    en-us
    {

	// MANUFACTURERS

	#LOC_cygnus_manufacturer = Bureau of Interorbital Resupply and Delievery

	// CYGNUS

	#LOC_cygnus_tags = bird cygnus cargo resupply pukeko

	#LOC_cygnus_adapter_1p5 = Pukeko 1.875m Structural adapter
	#LOC_cygnus_adapter_1p5_desc = This structural adapter allows you to connect almost anything you can think of (As long as it's 1.25m in diameter) to the top of a Pukeko PCU, while mostly maintaining its structural integrity.\n\nIncludes optional docking port bumper and spacers.

	#LOC_cygnus_cargo_1p5 = Pukeko 1.875m Pressurized Cargo Unit
	#LOC_cygnus_cargo_1p5_desc = The Pukeko Pressurized Cargo Unit is the result of a competition which aimed to see how little mass (and effort) was necessary to send a moderate amount of snacks to orbiting stations.\nThrough the ingenious use of stolen zinc panels and scaled-up tuna cans, the Pukeko has successfully eliminated delays due to damage during transport, since no one ever notices that it has gotten any uglier. Includes optional spacers.\n\n<#ef7b06> 1.25m Endcap hatches kindly provided by Benjee10.</color>

	#LOC_cygnus_cargo_1p5_config = Pukeko 1.875m Configurable Cargo Unit
	#LOC_cygnus_cargo_1p5_config_desc = After receiving numerous customer complaints about "Not enough radiators", "Too little white paint" or a "Lack of symmetry", the engineering department decided to finally give in and offload ALL of those responsibilities to someone else. You.\nThe Configurable Cargo Unit lets you pick any out of 15,625 possible surface panel combinations, provided you have the patience.\n\n<#ef7b06> 1.25m Endcap hatches kindly provided by Benjee10.</color>

	//HEXGNUS

	#LOC_cygnus_cargo_hex = Pukeko Hexagonal Cargo Unit
	#LOC_cygnus_cargo_hex_desc = After years in research and development, our engineers figured out the principle of "Less is more", which explains why this version of the Pressurized Cargo Unit looks like it was rendered on an ancient gaming console.\nOur engineers have sworn that this does not  in any way affect structural integrity, but seem to get very upset when someone pokes at the corners.\n\n<#ef7b06> 1.25m Endcap hatches kindly provided by Benjee10.\nPart of the april fools update.</color>

    }
